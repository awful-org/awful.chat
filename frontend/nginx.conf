server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    #TODO: change this to subdomain too
    # Proxy mediasoup SFU WebSocket signaling
    location /sfu {
        proxy_pass http://sfu:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Serve static assets directly
    location /og.png {
        alias /usr/share/nginx/html/og.png;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /robots.txt {
        alias /usr/share/nginx/html/robots.txt;
    }

    location /manifest.webmanifest {
        alias /usr/share/nginx/html/manifest.webmanifest;
    }

    location /apple-touch-icon-180x180.png {
        alias /usr/share/nginx/html/apple-touch-icon-180x180.png;
        expires 30d;
    }

    location /favicon.ico {
        alias /usr/share/nginx/html/favicon.ico;
        expires 30d;
    }

    location /pwa- {
        alias /usr/share/nginx/html/pwa-;
        expires 30d;
    }

    location /sw.js {
        alias /usr/share/nginx/html/sw.js;
        expires -1;
    }

    location /workbox- {
        alias /usr/share/nginx/html/workbox-;
        expires 30d;
    }

    # SPA fallback — all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

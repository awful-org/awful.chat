services:
  relay:
    build:
      context: ./relay
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
      - "9000:9000"
    volumes:
      - relay_data:/app/data
      - ./relay:/app
    environment:
      NODE_ENV: development
      HTTP_PORT: "8080"
      KLIPY_API_KEY: ${KLIPY_API_KEY:-dev-key}
    networks:
      - local-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_SIGNAL_URL: ${VITE_SIGNAL_URL:-http://localhost:8080/signal}
      VITE_SFU_URL: ${VITE_SFU_URL:-http://localhost:3000}
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
      VITE_RELAY_MULTIADDR: ${VITE_RELAY_MULTIADDR:-/ip4/127.0.0.1/tcp/9000/ws/p2p/QmRelay}
    depends_on:
      - relay
    networks:
      - local-network

  sfu:
    build:
      context: ./sfu
    ports:
      - "3001:3000"
      - "40000-40003:40000-40003/udp"
      - "40000-40003:40000-40003/tcp"
    environment:
      NODE_ENV: development
      SFU_PORT: "3000"
      ANNOUNCED_IP: "127.0.0.1"
      RTC_MIN_PORT: "40000"
      RTC_MAX_PORT: "40003"
    networks:
      - local-network

volumes:
  relay_data:

networks:
  local-network:
    driver: bridge

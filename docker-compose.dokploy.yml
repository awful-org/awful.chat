services:
  relay:
    build:
      context: ./relay
    restart: unless-stopped
    expose:
      - "9000"
    volumes:
      - relay_data:/app/data
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.http.routers.relay-http.rule=Host(`relay.${DOMAIN}`)
      - traefik.http.routers.relay-http.entrypoints=web
      - traefik.http.routers.relay-http.middlewares=relay-redirect
      - traefik.http.routers.relay-https.rule=Host(`relay.${DOMAIN}`)
      - traefik.http.routers.relay-https.entrypoints=websecure
      - traefik.http.routers.relay-https.tls=true
      - traefik.http.routers.relay-https.tls.certresolver=letsencrypt
      - traefik.http.services.relay-service.loadbalancer.server.port=9000
      - traefik.http.routers.relay-https.service=relay-service
      - traefik.http.routers.relay-http.service=relay-service
      - traefik.http.routers.relay-http.service=relay-service

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_SIGNAL_URL=${VITE_SIGNAL_URL}
        - VITE_API_URL=${VITE_API_URL}
        - VITE_RELAY_MULTIADDR=${VITE_RELAY_MULTIADDR}
    restart: unless-stopped
    depends_on:
      - relay
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.http.routers.awful2-http.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.awful2-http.entrypoints=web
      - traefik.http.routers.awful2-http.middlewares=awful2-redirect
      - traefik.http.middlewares.awful2-redirect.redirectscheme.scheme=https
      - traefik.http.routers.awful2-https.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.awful2-https.entrypoints=websecure
      - traefik.http.routers.awful2-https.tls=true
      - traefik.http.routers.awful2-https.tls.certresolver=letsencrypt
      - traefik.http.services.awful2-service.loadbalancer.server.port=80
      - traefik.http.routers.awful2-https.service=awful2-service
      - traefik.http.routers.awful2-http.service=awful2-service

volumes:
  relay_data:

networks:
  dokploy-network:
    external: true

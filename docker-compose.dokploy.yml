services:
  signal:
    build:
      context: ./signal
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      NODE_ENV: production
      KLIPY_API_KEY: ${KLIPY_API_KEY}
    networks:
      - dokploy-network

  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    command: >
      --log-file=stdout
      --verbose
      --realm=awful.frav.in
      --external-ip=${ANNOUNCED_IP}
      --listening-ip=0.0.0.0
      --lt-cred-mech
      --user=awful:awful
      --fingerprint
      --no-multicast-peers
      --denied-peer-ip=10.0.0.0-10.255.255.255
      --denied-peer-ip=192.168.0.0-192.168.255.255
      --denied-peer-ip=172.16.0.0-172.31.255.255
      --min-port=49152
      --max-port=49202
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49152-49202:49152-49202/udp"
    networks:
      - dokploy-network

  sfu:
    build:
      context: ./sfu
    restart: unless-stopped
    expose:
      - "3000"
    ports:
      - ${PORTS_UDP:-40000-40499:40000-40499/udp}
      - ${PORTS_TCP:-40000-40499:40000-40499/tcp}
    environment:
      NODE_ENV: production
      SFU_PORT: "3000"
      ANNOUNCED_IP: ${ANNOUNCED_IP:?ANNOUNCED_IP must be set to the server public IP}
      RTC_MIN_PORT: ${RTC_MIN:-40000}
      RTC_MAX_PORT: ${RTC_MAX:-40499}
    networks:
      - dokploy-network

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - signal
      - sfu
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.http.routers.awful-http.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.awful-http.entrypoints=web
      - traefik.http.routers.awful-http.middlewares=awful-redirect
      - traefik.http.middlewares.awful-redirect.redirectscheme.scheme=https
      - traefik.http.routers.awful-https.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.awful-https.entrypoints=websecure
      - traefik.http.routers.awful-https.tls=true
      - traefik.http.routers.awful-https.tls.certresolver=letsencrypt
      - traefik.http.services.awful-service.loadbalancer.server.port=80
      - traefik.http.routers.awful-https.service=awful-service
      - traefik.http.routers.awful-http.service=awful-service

networks:
  dokploy-network:
    external: true
